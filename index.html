<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nikolaos Dimitriou</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Nikolaos Dimitriou - Linux Systems, Automation & DevOps">

  <meta property="og:title" content="Nikolaos Dimitriou">
  <meta property="og:description" content="Linux Systems & Automation | DevOps | IoT / Edge Systems">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://nyxatrum.net">
  <meta property="og:image" content="https://nyxatrum.net/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://nyxatrum.net/og-image.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./styles.css">
</head>

<body>
  <main class="card">

    <header class="header">
      <div class="status" aria-label="System status: online">
        <div class="dot" aria-hidden="true"></div>
        <span>online · uptime 99.99%</span>
      </div>

      <div class="avatar">
        <img src="./avatar_yl.webp" alt="Nikolaos Dimitriou">
      </div>

      <h1 class="typing" aria-label="Nikolaos Dimitriou">
        <span class="text" aria-hidden="true"></span>
        <span class="cursor-inline" aria-hidden="true">_</span>
      </h1>

      <p class="role">
        Linux Systems &amp; Automation | DevOps | IoT / Edge Systems
      </p>
    </header>

    <section class="section" aria-labelledby="skills-title">
      <div class="section-title terminal-title" id="skills-title">$ core_stack</div>

      <div class="skills" role="list">
        <div class="skill" role="listitem">Linux</div>
        <div class="skill" role="listitem">Automation</div>
        <div class="skill" role="listitem">Networking</div>
        <div class="skill" role="listitem">Containers</div>
        <div class="skill" role="listitem">IaC</div>
        <div class="skill" role="listitem">CI/CD</div>
        <div class="skill" role="listitem">Observability</div>
        <div class="skill" role="listitem">Security</div>
      </div>
    </section>

    <section class="section" aria-labelledby="links-title">
      <div class="section-title terminal-title" id="links-title">$ links</div>

      <nav class="links" aria-label="Social links">
        <a href="https://www.linkedin.com/in/ngdimitriou" target="_blank" rel="noopener noreferrer"
           aria-label="LinkedIn profile (opens in new tab)">
          <span>LinkedIn</span>
        </a>

        <a href="https://github.com/nyxatrum" target="_blank" rel="noopener noreferrer"
           aria-label="GitHub profile (opens in new tab)">
          <span>GitHub</span>
        </a>

        <a href="mailto:ngdimitriou@proton.me" class="link-full"
           aria-label="Send email">
          <span>Email</span>
        </a>
      </nav>
    </section>

    <footer class="footer">
      [ nyxatrum.net ] · Build · Automate · Observe
    </footer>

  </main>

  <script>
    (function () {
      const el = document.querySelector('.typing .text');
      const name = 'Nikolaos Dimitriou';

      const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (prefersReduced) {
        el.textContent = name;
        return;
      }

      let i = 0;
      const speed = 80;

      function type() {
        if (i <= name.length) {
          el.textContent = name.slice(0, i);
          i++;
          setTimeout(type, speed);
        }
      }

      setTimeout(type, 300);
    })();
  </script>

</body>
</html>
