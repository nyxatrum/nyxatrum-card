  <meta property="og:title" content="Nikolaos Dimitriou">
  <meta property="og:description" content="Linux Systems & Automation | DevOps | IoT / Edge Systems">

  <meta property="og:image" content="https://nyxatrum.net/og-image.png">

  <link rel="stylesheet" href="./styles.css">

<body>
  <main class="card">

    <header class="header">
      <div class="status">
        <div class="dot"></div>
        <span>online · uptime 99.99%</span>
      </div>

      <div class="avatar">
        <img src="./avatar_yl.webp" alt="Nikolaos Dimitriou">
      </div>

      <h1 class="typing" aria-label="Nikolaos Dimitriou">
        <span class="text"></span>
        <span class="cursor-inline">_</span>
      </h1>

      <p class="role">
        Linux Systems &amp; Automation | DevOps | IoT / Edge Systems
      </p>
    </header>

    <section class="section">
      <div class="section-title">$ core_stack</div>
      <div class="skills">
        <div class="skill">Linux</div>
        <div class="skill">Automation</div>
        <div class="skill">Networking</div>
        <div class="skill">Containers</div>
        <div class="skill">IaC</div>
        <div class="skill">CI/CD</div>
        <div class="skill">Observability</div>
        <div class="skill">Security</div>
      </div>
    </section>

    <section class="section">
      <div class="section-title">$ links</div>
      <nav class="links">
        <a href="https://www.linkedin.com/in/ngdimitriou" target="_blank" rel="noopener noreferrer">
          <span>LinkedIn</span>
        </a>
        <a href="https://github.com/nyxatrum" target="_blank" rel="noopener noreferrer">
          <span>GitHub</span>
        </a>
        <a href="mailto:ngdimitriou@proton.me" class="link-full">
          <span>Email</span>
        </a>
      </nav>
    </section>

    <footer class="footer">
      [ nyxatrum.net ] · Build · Automate · Observe
    </footer>

  </main>

  <script>
    (function () {
      const el = document.querySelector('.typing .text');
      const name = 'Nikolaos Dimitriou';

      const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (prefersReduced) {
        el.textContent = name;
        return;
      }

      let i = 0;
      const speed = 80;

      function type() {
        if (i <= name.length) {
          el.textContent = name.slice(0, i);
          i++;
          setTimeout(type, speed);
        }
      }

      setTimeout(type, 300);
    })();
  </script>

</body>
</html>
